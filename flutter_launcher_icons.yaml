# Regenerate through `dart run tool/generate_native_branding.dart` so Android
# resources are optimized after the platform icon sets are created.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  remove_alpha_ios: true
  background_color_ios: "#030206"
  adaptive_icon_background: "#030206"
  adaptive_icon_foreground: assets/branding/app_icon.png
  adaptive_icon_foreground_inset: 16
  min_sdk_android: 21
